<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Dashboard</title>
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body>
  <div id="app-shell">
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">Sistema</h2>
        <span class="sidebar-user" id="user-display"></span>
      </div>
      <ul class="sidebar-menu" id="sidebar-menu"></ul>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-full" id="btn-logout">Sair</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="topbar">
        <button class="btn btn-ghost sidebar-toggle" id="btn-sidebar">&#9776;</button>
        <h1 id="page-title">Dashboard</h1>
      </header>

      <div class="content" id="content">
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">&#128100;</div>
            <div class="stat-info">
              <span class="stat-value" id="stat-users">-</span>
              <span class="stat-label">Usuários</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#128230;</div>
            <div class="stat-info">
              <span class="stat-value" id="stat-modules">-</span>
              <span class="stat-label">Módulos</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#128274;</div>
            <div class="stat-info">
              <span class="stat-value" id="stat-sessions">-</span>
              <span class="stat-label">Sessões Ativas</span>
            </div>
          </div>
        </div>

        <section class="section" id="section-users">
          <div class="section-header">
            <h2>Usuários</h2>
            <button class="btn btn-primary btn-sm" id="btn-new-user">+ Novo Usuário</button>
          </div>
          <div class="table-container">
            <table class="table" id="users-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Usuário</th>
                  <th>Nome</th>
                  <th>Role</th>
                  <th>Ativo</th>
                  <th>Último Login</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
        </section>

        <section class="section" id="section-modules">
          <div class="section-header">
            <h2>Módulos</h2>
          </div>
          <div class="modules-grid" id="modules-grid"></div>
        </section>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Novo Usuário</h3>
        <button class="btn btn-ghost" id="btn-modal-close">&times;</button>
      </div>
      <form id="user-form" class="modal-body">
        <input type="hidden" id="edit-user-id">
        <div class="form-group">
          <label for="form-username">Usuário</label>
          <input type="text" id="form-username" required minlength="3">
        </div>
        <div class="form-group">
          <label for="form-email">Email</label>
          <input type="email" id="form-email">
        </div>
        <div class="form-group">
          <label for="form-displayname">Nome de exibição</label>
          <input type="text" id="form-displayname">
        </div>
        <div class="form-group">
          <label for="form-password">Senha</label>
          <input type="password" id="form-password" minlength="6">
        </div>
        <div class="form-group">
          <label for="form-role">Role</label>
          <select id="form-role">
            <option value="user">Usuário</option>
            <option value="admin">Admin</option>
            <option value="super_admin">Super Admin</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="btn-modal-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script src="/shared/app.js"></script>
  <script src="/m/admin/admin.js"></script>
</body>
</html>
