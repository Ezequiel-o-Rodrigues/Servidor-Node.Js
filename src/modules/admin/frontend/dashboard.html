<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Dashboard</title>
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body>
  <div id="app-shell">
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">Sistema</h2>
        <span class="sidebar-user" id="user-display"></span>
      </div>
      <ul class="sidebar-menu" id="sidebar-menu"></ul>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-full" onclick="doLogout()">Sair</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="topbar">
        <button class="btn btn-ghost sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
        <h1 id="page-title">Dashboard</h1>
      </header>

      <div class="content" id="content">
        <!-- Stats Cards -->
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">&#128100;</div>
            <div class="stat-info">
              <span class="stat-value" id="stat-users">-</span>
              <span class="stat-label">Usuários</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#128230;</div>
            <div class="stat-info">
              <span class="stat-value" id="stat-modules">-</span>
              <span class="stat-label">Módulos</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#128274;</div>
            <div class="stat-info">
              <span class="stat-value" id="stat-sessions">-</span>
              <span class="stat-label">Sessões Ativas</span>
            </div>
          </div>
        </div>

        <!-- Users Section -->
        <section class="section" id="section-users">
          <div class="section-header">
            <h2>Usuários</h2>
            <button class="btn btn-primary btn-sm" onclick="showCreateUserModal()">+ Novo Usuário</button>
          </div>
          <div class="table-container">
            <table class="table" id="users-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Usuário</th>
                  <th>Nome</th>
                  <th>Role</th>
                  <th>Ativo</th>
                  <th>Último Login</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
        </section>

        <!-- Modules Section -->
        <section class="section" id="section-modules">
          <div class="section-header">
            <h2>Módulos</h2>
          </div>
          <div class="modules-grid" id="modules-grid"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- Create User Modal -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Novo Usuário</h3>
        <button class="btn btn-ghost" onclick="closeModal()">&times;</button>
      </div>
      <form id="user-form" class="modal-body">
        <input type="hidden" id="edit-user-id">
        <div class="form-group">
          <label for="form-username">Usuário</label>
          <input type="text" id="form-username" required minlength="3">
        </div>
        <div class="form-group">
          <label for="form-email">Email</label>
          <input type="email" id="form-email">
        </div>
        <div class="form-group">
          <label for="form-displayname">Nome de exibição</label>
          <input type="text" id="form-displayname">
        </div>
        <div class="form-group">
          <label for="form-password">Senha</label>
          <input type="password" id="form-password" minlength="6">
        </div>
        <div class="form-group">
          <label for="form-role">Role</label>
          <select id="form-role">
            <option value="user">Usuário</option>
            <option value="admin">Admin</option>
            <option value="super_admin">Super Admin</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script src="/shared/app.js"></script>
  <script>
    // ========== INIT ==========
    initApp('admin');
    loadDashboard();

    async function loadDashboard() {
      await Promise.all([loadStats(), loadUsers(), loadModules()]);
    }

    // ========== STATS ==========
    async function loadStats() {
      try {
        const stats = await API.get('/api/admin/stats');
        document.getElementById('stat-users').textContent = stats.users.total;
        document.getElementById('stat-modules').textContent = stats.modules.enabled;
        document.getElementById('stat-sessions').textContent = stats.activeSessions;
      } catch (err) {
        console.error('Erro ao carregar stats:', err);
      }
    }

    // ========== USERS ==========
    async function loadUsers() {
      try {
        const users = await API.get('/api/admin/users');
        const tbody = document.getElementById('users-tbody');
        tbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td><strong>${u.username}</strong></td>
            <td>${u.display_name || '-'}</td>
            <td><span class="badge badge-${u.role === 'super_admin' ? 'danger' : u.role === 'admin' ? 'warning' : 'default'}">${u.role}</span></td>
            <td><span class="badge badge-${u.active ? 'success' : 'default'}">${u.active ? 'Sim' : 'Não'}</span></td>
            <td>${u.last_login ? new Date(u.last_login).toLocaleString('pt-BR') : 'Nunca'}</td>
            <td>
              <button class="btn btn-ghost btn-xs" onclick="editUser(${u.id})">Editar</button>
              <button class="btn btn-ghost btn-xs text-danger" onclick="confirmDeleteUser(${u.id}, '${u.username}')">Excluir</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        console.error('Erro ao carregar usuários:', err);
      }
    }

    function showCreateUserModal() {
      document.getElementById('modal-title').textContent = 'Novo Usuário';
      document.getElementById('user-form').reset();
      document.getElementById('edit-user-id').value = '';
      document.getElementById('form-password').required = true;
      document.getElementById('form-username').disabled = false;
      document.getElementById('modal-overlay').hidden = false;
    }

    async function editUser(id) {
      try {
        const user = await API.get(`/api/admin/users/${id}`);
        document.getElementById('modal-title').textContent = 'Editar Usuário';
        document.getElementById('edit-user-id').value = id;
        document.getElementById('form-username').value = user.username;
        document.getElementById('form-username').disabled = true;
        document.getElementById('form-email').value = user.email || '';
        document.getElementById('form-displayname').value = user.display_name || '';
        document.getElementById('form-role').value = user.role;
        document.getElementById('form-password').value = '';
        document.getElementById('form-password').required = false;
        document.getElementById('modal-overlay').hidden = false;
      } catch (err) {
        alert('Erro ao carregar usuário: ' + err.message);
      }
    }

    function closeModal() {
      document.getElementById('modal-overlay').hidden = true;
    }

    document.getElementById('user-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-user-id').value;
      const data = {
        email: document.getElementById('form-email').value || undefined,
        displayName: document.getElementById('form-displayname').value || undefined,
        role: document.getElementById('form-role').value,
      };

      const password = document.getElementById('form-password').value;
      if (password) data.password = password;

      try {
        if (id) {
          await API.put(`/api/admin/users/${id}`, data);
        } else {
          data.username = document.getElementById('form-username').value;
          await API.post('/api/admin/users', data);
        }
        closeModal();
        await loadUsers();
        await loadStats();
      } catch (err) {
        alert('Erro: ' + err.message);
      }
    });

    async function confirmDeleteUser(id, username) {
      if (!confirm(`Tem certeza que deseja excluir o usuário "${username}"?`)) return;
      try {
        await API.delete(`/api/admin/users/${id}`);
        await loadUsers();
        await loadStats();
      } catch (err) {
        alert('Erro ao excluir: ' + err.message);
      }
    }

    // ========== MODULES ==========
    async function loadModules() {
      try {
        const modules = await API.get('/api/admin/modules');
        const grid = document.getElementById('modules-grid');
        grid.innerHTML = modules.map(m => `
          <div class="module-card ${m.enabled ? '' : 'module-disabled'}">
            <div class="module-header">
              <span class="module-icon">${getIcon(m.icon)}</span>
              <h3>${m.name}</h3>
            </div>
            <p class="module-desc">${m.description || ''}</p>
            <div class="module-footer">
              <span class="badge badge-${m.enabled ? 'success' : 'default'}">${m.enabled ? 'Ativo' : 'Inativo'}</span>
              <span class="text-muted">v${m.version}</span>
              <label class="toggle">
                <input type="checkbox" ${m.enabled ? 'checked' : ''} onchange="toggleModule('${m.slug}', this.checked)">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Erro ao carregar módulos:', err);
      }
    }

    async function toggleModule(slug, enabled) {
      try {
        await API.patch(`/api/admin/modules/${slug}`, { enabled });
        await loadModules();
        await loadStats();
      } catch (err) {
        alert('Erro: ' + err.message);
      }
    }

    function getIcon(name) {
      const icons = {
        shield: '&#128737;',
        settings: '&#9881;',
        box: '&#128230;',
        users: '&#128101;',
      };
      return icons[name] || icons.box;
    }
  </script>
</body>
</html>
