<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema</title>
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1>Bem-vindo</h1>
        <p>Faça login para acessar o sistema</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required autocomplete="username" autofocus placeholder="Seu nome de usuário">
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Sua senha">
        </div>

        <div id="error-message" class="error-message" hidden></div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-login">
          <span class="btn-text">Entrar</span>
          <span class="btn-loading" hidden>
            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 12 12;360 12 12" dur="0.8s" repeatCount="indefinite"/></circle></svg>
            Entrando...
          </span>
        </button>
      </form>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error-message');
    const btnLogin = document.getElementById('btn-login');

    // Se já está logado, redirecionar
    API.get('/api/auth/profile').then(() => {
      window.location.href = '/app';
    }).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      btnLogin.querySelector('.btn-text').hidden = true;
      btnLogin.querySelector('.btn-loading').hidden = false;
      btnLogin.disabled = true;

      try {
        const data = await API.post('/api/auth/login', {
          username: form.username.value,
          password: form.password.value,
        });

        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('token', data.token);
        window.location.href = '/app';
      } catch (err) {
        errorEl.textContent = err.message || 'Erro ao fazer login';
        errorEl.hidden = false;
      } finally {
        btnLogin.querySelector('.btn-text').hidden = false;
        btnLogin.querySelector('.btn-loading').hidden = true;
        btnLogin.disabled = false;
      }
    });
  </script>
</body>
</html>
