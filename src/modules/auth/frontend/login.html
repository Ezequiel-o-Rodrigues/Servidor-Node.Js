<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema</title>
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1>Bem-vindo</h1>
        <p>Faça login para acessar o sistema</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required autocomplete="username" autofocus placeholder="Seu nome de usuário">
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Sua senha">
        </div>

        <div id="error-message" class="error-message" hidden></div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-login">
          <span class="btn-text">Entrar</span>
          <span class="btn-loading" hidden>Entrando...</span>
        </button>
      </form>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script src="/m/auth/login.js"></script>
</body>
</html>
