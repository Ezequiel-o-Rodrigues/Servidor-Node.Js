<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema</title>
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1>Bem-vindo</h1>
        <p>Faça login para acessar o sistema</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-password">Senha</button>
        <button class="auth-tab" id="tab-ssh">Chave SSH</button>
      </div>

      <!-- Password Login -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required autocomplete="username" autofocus placeholder="Seu nome de usuário">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Sua senha">
        </div>
        <div id="error-message" class="error-message" hidden></div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-login">
          <span class="btn-text">Entrar</span>
          <span class="btn-loading" hidden>Entrando...</span>
        </button>
      </form>

      <!-- SSH Login -->
      <div id="ssh-login" hidden>
        <!-- Step 1: Request challenge -->
        <div id="ssh-step1">
          <form id="ssh-challenge-form" class="auth-form">
            <div class="form-group">
              <label for="ssh-username">Usuário</label>
              <input type="text" id="ssh-username" required placeholder="Seu nome de usuário">
            </div>
            <div id="ssh-error" class="error-message" hidden></div>
            <button type="submit" class="btn btn-primary btn-full">Gerar Challenge</button>
          </form>
        </div>

        <!-- Step 2: Sign challenge -->
        <div id="ssh-step2" hidden>
          <div class="form-group">
            <label>Execute no terminal:</label>
            <div style="background:#0f172a;color:#22c55e;padding:12px;border-radius:var(--radius);font-family:monospace;font-size:12px;word-break:break-all;margin-bottom:8px" id="ssh-command"></div>
            <button class="btn btn-ghost btn-sm" id="btn-copy-cmd">Copiar comando</button>
          </div>
          <form id="ssh-verify-form" class="auth-form" style="margin-top:16px">
            <div class="form-group">
              <label for="ssh-signature">Cole a assinatura aqui:</label>
              <textarea id="ssh-signature" required rows="4" placeholder="Cole o resultado do comando acima..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-family:monospace;font-size:12px;resize:vertical"></textarea>
            </div>
            <div id="ssh-verify-error" class="error-message" hidden></div>
            <button type="submit" class="btn btn-primary btn-full">Verificar e Entrar</button>
            <button type="button" class="btn btn-ghost btn-full" id="btn-ssh-back" style="margin-top:8px">Voltar</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script src="/m/auth/login.js"></script>
</body>
</html>
