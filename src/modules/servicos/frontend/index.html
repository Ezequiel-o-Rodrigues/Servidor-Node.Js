<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços — Sistema</title>
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body>
  <div id="app-shell">
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header"><h2 class="sidebar-title">Sistema</h2><span class="sidebar-user" id="user-display"></span></div>
      <ul class="sidebar-menu" id="sidebar-menu"></ul>
      <div class="sidebar-footer"><button class="btn btn-ghost btn-full" id="btn-logout">Sair</button></div>
    </nav>
    <main class="main-content">
      <header class="topbar">
        <button class="btn btn-ghost sidebar-toggle" id="btn-sidebar">&#9776;</button>
        <h1>Serviços</h1>
      </header>
      <div class="content">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon">&#128230;</div><div class="stat-info"><span class="stat-value" id="stat-total">-</span><span class="stat-label">Total</span></div></div>
          <div class="stat-card"><div class="stat-icon">&#9989;</div><div class="stat-info"><span class="stat-value" id="stat-ativos">-</span><span class="stat-label">Ativos</span></div></div>
          <div class="stat-card"><div class="stat-icon">&#10060;</div><div class="stat-info"><span class="stat-value" id="stat-inativos">-</span><span class="stat-label">Inativos</span></div></div>
          <div class="stat-card"><div class="stat-icon">&#128101;</div><div class="stat-info"><span class="stat-value" id="stat-clientes">-</span><span class="stat-label">Clientes Atendidos</span></div></div>
        </div>

        <section class="section">
          <div class="section-header">
            <h2>Serviços</h2>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" id="busca" placeholder="Buscar..." style="padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
              <button class="btn btn-primary btn-sm" id="btn-novo">+ Novo Serviço</button>
            </div>
          </div>
          <div class="table-container">
            <table class="table">
              <thead><tr><th>Serviço</th><th>Cliente</th><th>Tipo</th><th>Status</th><th>Site</th><th>Valor</th><th>Ações</th></tr></thead>
              <tbody id="servicos-tbody"></tbody>
            </table>
          </div>
        </section>

        <!-- Detalhe do Serviço -->
        <section class="section" id="detalhe-section" hidden>
          <div class="section-header"><h2 id="detalhe-nome">-</h2><button class="btn btn-ghost btn-sm" id="btn-fechar-detalhe">&times; Fechar</button></div>
          <div style="padding:20px" id="detalhe-content"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- Modal Serviço -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" style="max-width:650px">
      <div class="modal-header"><h3 id="modal-title">Novo Serviço</h3><button class="btn btn-ghost" id="btn-modal-close">&times;</button></div>
      <form id="servico-form" class="modal-body">
        <input type="hidden" id="edit-id">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group" style="grid-column:1/-1"><label>Nome *</label><input type="text" id="f-nome" required></div>
          <div class="form-group"><label>Cliente</label><select id="f-cliente"><option value="">Sem cliente</option></select></div>
          <div class="form-group"><label>Tipo</label><input type="text" id="f-tipo" placeholder="Ex: Hospedagem, Site, Sistema"></div>
          <div class="form-group" style="grid-column:1/-1"><label>Descrição</label><textarea id="f-descricao" rows="2" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);resize:vertical"></textarea></div>
          <div class="form-group"><label>URL do Site</label><input type="text" id="f-url-site" placeholder="https://"></div>
          <div class="form-group"><label>URL Admin</label><input type="text" id="f-url-admin" placeholder="https://"></div>
          <div class="form-group"><label>URL Banco</label><input type="text" id="f-url-banco" placeholder="https://"></div>
          <div class="form-group"><label>IP Servidor</label><input type="text" id="f-ip"></div>
          <div class="form-group"><label>Porta</label><input type="number" id="f-porta"></div>
          <div class="form-group"><label>Nome do Banco</label><input type="text" id="f-banco-nome"></div>
          <div class="form-group"><label>Usuário do Banco</label><input type="text" id="f-banco-user"></div>
          <div class="form-group"><label>Credenciais/Senhas</label><input type="text" id="f-credenciais"></div>
          <div class="form-group"><label>Valor Mensal (R$)</label><input type="number" id="f-valor" step="0.01"></div>
          <div class="form-group"><label>Data Início</label><input type="date" id="f-inicio"></div>
          <div class="form-group"><label>Vencimento</label><input type="date" id="f-vencimento"></div>
          <div class="form-group" style="grid-column:1/-1"><label>Observações</label><textarea id="f-obs" rows="2" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);resize:vertical"></textarea></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-ghost" id="btn-modal-cancel">Cancelar</button><button type="submit" class="btn btn-primary">Salvar</button></div>
      </form>
    </div>
  </div>

  <!-- Modal Link -->
  <div class="modal-overlay" id="link-modal" hidden>
    <div class="modal" style="max-width:400px">
      <div class="modal-header"><h3>Adicionar Link</h3><button class="btn btn-ghost" id="btn-link-close">&times;</button></div>
      <form id="link-form" class="modal-body">
        <input type="hidden" id="link-servico-id">
        <div class="form-group"><label>Título</label><input type="text" id="f-link-titulo" required></div>
        <div class="form-group"><label>URL</label><input type="text" id="f-link-url" required placeholder="https://"></div>
        <div class="form-group"><label>Tipo</label><select id="f-link-tipo"><option value="site">Site</option><option value="admin">Admin</option><option value="banco">Banco</option><option value="docs">Documentação</option><option value="outro">Outro</option></select></div>
        <div class="modal-footer"><button type="button" class="btn btn-ghost" id="btn-link-cancel">Cancelar</button><button type="submit" class="btn btn-primary">Adicionar</button></div>
      </form>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script src="/shared/app.js"></script>
  <script src="/m/servicos/servicos.js"></script>
</body>
</html>
